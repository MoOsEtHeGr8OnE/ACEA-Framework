name: Quality Gate
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python syntax check
        run: |
          find . -name "*.py" -not -path "*/venv/*" -not -path "*/.venv/*" | while read f; do
            python -c "import py_compile; py_compile.compile('$f', doraise=True)" 2>&1 || echo "FAIL: $f"
          done
      - name: Security scan
        run: |
          echo "=== Checking for hardcoded secrets ==="
          ! grep -rn "sk_live\|sk_test\|AKIA\|password.*=.*['\"']" --include="*.py" --include="*.env" . 2>/dev/null | grep -v venv | grep -v ".env.example" || echo "No secrets found"